<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${employeeDTO.id == null} ? 'Add Employee' : 'Edit Employee'">Employee Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 th:text="${employeeDTO.id == null} ? 'Add New Employee' : 'Edit Employee'">Employee Form</h1>
            <div class="user-info">
                <span th:text="${#authentication.name}">User</span>
                <a href="/logout">Logout</a>
            </div>
        </div>
        
        <div class="nav">
            <a href="/dashboard">Dashboard</a>
            <a href="/assets">Assets</a>
            <a href="/employees" class="active">Employees</a>
            <a href="/assignments">Assignments</a>
        </div>
        
        <div class="card">
            <div class="card-body">
                <form th:action="@{${employeeDTO.id == null} ? '/employees/create' : '/employees/' + ${employeeDTO.id} + '/edit'}" 
                      th:object="${employeeDTO}" method="post">
                    
                    <input type="hidden" th:field="*{id}" th:if="${employeeDTO.id != null}"/>
                    
                    <div class="form-group">
                        <label class="form-label">Employee ID *</label>
                        <input type="text" th:field="*{employeeId}" class="form-control" required placeholder="e.g., EMP001">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Full Name *</label>
                        <input type="text" th:field="*{fullName}" class="form-control" required placeholder="Enter full name">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input type="email" th:field="*{email}" class="form-control" required placeholder="email@airtel.com">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Department *</label>
                        <select th:field="*{department}" class="form-control" required>
                            <option value="">Select Department</option>
                            <option value="IT">IT</option>
                            <option value="HR">HR</option>
                            <option value="FINANCE">Finance</option>
                            <option value="OPERATIONS">Operations</option>
                            <option value="SALES">Sales</option>
                            <option value="MARKETING">Marketing</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Designation</label>
                        <input type="text" th:field="*{designation}" class="form-control" placeholder="e.g., Software Engineer">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="text" th:field="*{phoneNumber}" class="form-control" placeholder="Enter phone number">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Hire Date</label>
                        <input type="date" th:field="*{hireDate}" class="form-control">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Address</label>
                        <textarea th:field="*{address}" class="form-control" rows="2" placeholder="Enter address"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Status</label>
                        <select th:field="*{active}" class="form-control">
                            <option value="true">Active</option>
                            <option value="false">Inactive</option>
                        </select>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Employee</button>
                        <a href="/employees" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
