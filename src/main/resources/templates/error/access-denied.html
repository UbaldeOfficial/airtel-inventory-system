<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Airtel Inventory</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚠️ Access Denied</h1>
            <div class="user-info">
                <span th:text="${#authentication.name}">User</span>
                <a href="/logout">Logout</a>
            </div>
        </div>
        
        <div class="card">
            <div class="card-body" style="text-align: center; padding: 50px;">
                <h2 style="color: #e30613; margin-bottom: 20px;">Access Denied</h2>
                <p style="margin-bottom: 30px;">You don't have permission to access this resource.</p>
                <p style="margin-bottom: 30px; color: #666;">
                    Your role: <strong th:text="${#authentication.authorities}">ROLE_HR</strong>
                </p>
                
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <a href="/dashboard" class="btn btn-primary">Return to Dashboard</a>
                    <a href="/assets" class="btn btn-secondary">Go to Assets</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
